<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts — Inter (preconnect for speed) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Structured Data — WebSite (static fallback, dynamic JSON-LD added per-page by React) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Actero",
      "url": "https://actero.fr/",
      "description": "Agents IA & automatisation pour e-commerce Shopify",
      "inLanguage": "fr"
    }
  </script>

  <!-- SEO Primaire (fallback — dynamic per-page via react-helmet-async) -->
  <title>Actero | Agents IA & Automatisation pour E-commerce Shopify</title>
  <meta name="description"
    content="Actero déploie des agents IA et des infrastructures d'automatisation pour les boutiques e-commerce Shopify. SAV automatisé, workflows intelligents, croissance accélérée." />
  <link rel="canonical" href="https://actero.fr/" />

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://actero.fr/" />
  <meta property="og:title" content="Actero | Agents IA & Automatisation pour E-commerce Shopify" />
  <meta property="og:description"
    content="Actero déploie des agents IA et des infrastructures d'automatisation pour les boutiques e-commerce Shopify. SAV automatisé, workflows intelligents, croissance accélérée." />
  <meta property="og:image" content="https://actero.fr/og-image.jpg" />
  <meta property="og:site_name" content="Actero" />
  <meta property="og:locale" content="fr_FR" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://actero.fr/" />
  <meta name="twitter:title" content="Actero | Agents IA & Automatisation pour E-commerce Shopify" />
  <meta name="twitter:description"
    content="Actero déploie des agents IA et des infrastructures d'automatisation pour les boutiques e-commerce Shopify. SAV automatisé, workflows intelligents, croissance accélérée." />
  <meta name="twitter:image" content="https://actero.fr/og-image.jpg" />

  <!-- Amplitude Setup -->
  <script src="https://cdn.eu.amplitude.com/script/8d23fc0b05efe38b235cb209e32af315.js"></script>
  <script>
    window.amplitude.add(window.sessionReplay.plugin({ sampleRate: 1 }));
    window.amplitude.init('8d23fc0b05efe38b235cb209e32af315', { "fetchRemoteConfig": true, "serverZone": "EU", "autocapture": true });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
